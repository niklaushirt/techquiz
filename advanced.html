<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechQuiz — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#080c10;--surface:#0d1117;--border:#21262d;--accent:#00e5a0;--text:#e6edf3;--muted:#8b949e; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
    .shell{position:relative;z-index:1;text-align:center;max-width:480px}
    .badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(0,229,160,.3);background:rgba(0,229,160,.06);padding:5px 14px;border-radius:20px;margin-bottom:28px}
    h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-.03em;margin-bottom:14px}
    h1 em{font-style:normal;color:var(--accent)}
    p{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:36px}
    a{display:inline-flex;align-items:center;gap:8px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--accent);font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:11px 22px;border-radius:6px;text-decoration:none;transition:background .15s}
    a:hover{background:rgba(0,229,160,.18)}
  </style>
</head>
<body>
<div class="shell">
  <div class="badge">Coming soon</div>
  <h1>Quiz <em>under construction</em></h1>
  <p>This quiz track is being built. Check back soon — or sharpen your skills on the Foundations quiz in the meantime.</p>
  <a href="index.html">← Back to all quizzes</a>
</div>
</body>
</html>
